  <text x="618" y="288" text-anchor="middle" font-size="9" fill="#e0c890">§121 · step-up basis</text>
  <text x="618" y="302" text-anchor="middle" font-size="9" fill="#e0c890">RLT · DPOA · POLST</text>

  <!-- faithAgent -->
  <line x1="788" y1="195" x2="788" y2="208" stroke="#8e7b5e" stroke-width="1.5"/>
  <rect x="712" y="208" width="152" height="110" rx="8" fill="url(#faithGrad)" filter="url(#softShadow)"/>
  <rect x="712" y="208" width="152" height="4" rx="2" fill="#d8a8a8"/>
  <text x="788" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#f8f0f0">faithAgent</text>
  <text x="788" y="250" text-anchor="middle" font-size="10" fill="#e8c8c8">faith.*</text>
  <line x1="728" y1="260" x2="848" y2="260" stroke="#906060" stroke-width="0.5" opacity="0.5"/>
  <text x="788" y="274" text-anchor="middle" font-size="9" fill="#e0b8b8">Ignatian Examen</text>
  <text x="788" y="288" text-anchor="middle" font-size="9" fill="#e0b8b8">consolation / desolation</text>
  <text x="788" y="302" text-anchor="middle" font-size="9" fill="#e0b8b8">Catholic practice</text>

  <!-- emotionalAgent -->
  <line x1="958" y1="195" x2="958" y2="208" stroke="#8e7b5e" stroke-width="1.5"/>
  <rect x="882" y="208" width="152" height="110" rx="8" fill="url(#emotGrad)" filter="url(#softShadow)"/>
  <rect x="882" y="208" width="152" height="4" rx="2" fill="#d8d0a8"/>
  <text x="958" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#f8f8ee">emotionalAgent</text>
  <text x="958" y="250" text-anchor="middle" font-size="10" fill="#e8e0c0">emotional.*</text>
  <line x1="898" y1="260" x2="1018" y2="260" stroke="#907050" stroke-width="0.5" opacity="0.5"/>
  <text x="958" y="274" text-anchor="middle" font-size="9" fill="#e0d8b0">CBT · PERMA</text>
  <text x="958" y="288" text-anchor="middle" font-size="9" fill="#e0d8b0">Erikson Stage 8</text>
  <text x="958" y="302" text-anchor="middle" font-size="9" fill="#e0d8b0">Worden grief tasks</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- CROSS-AGENT SIGNALS label                          -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text x="550" y="355" text-anchor="middle" font-size="10" fill="#8e7b5e" font-style="italic">↔  cross-agent signals  (consolation/desolation · wellness · financial runway · home accessibility)</text>
  <line x1="80" y1="365" x2="1020" y2="365" stroke="#c8b89a" stroke-width="0.5" stroke-dasharray="6,4"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- RECORD AGENT — shared service tier                 -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="200" y="378" width="700" height="72" rx="8" fill="url(#recordGrad)" filter="url(#shadow)"/>
  <rect x="200" y="378" width="700" height="4" rx="2" fill="#90a8b8"/>
  <text x="550" y="403" text-anchor="middle" font-size="14" font-weight="bold" fill="#e8f0f4">RecordAgent  —  Common Records Service</text>
  <text x="550" y="421" text-anchor="middle" font-size="10.5" fill="#b0c8d8">life.core.records  ·  git-as-master  ·  auto_push=true  ·  lifeTracker-data (private repo)</text>
  <text x="550" y="439" text-anchor="middle" font-size="10" fill="#90aaba" font-style="italic">Read · Write · Append · Register Document · Get Action Items  —  no agent touches the filesystem directly</text>

  <!-- connectors: agents → RecordAgent -->
  <line x1="108" y1="318" x2="108" y2="378" stroke="#506070" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <line x1="278" y1="318" x2="278" y2="378" stroke="#506070" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <line x1="448" y1="318" x2="448" y2="378" stroke="#506070" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <line x1="618" y1="318" x2="618" y2="378" stroke="#506070" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <line x1="788" y1="318" x2="788" y2="378" stroke="#506070" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <line x1="958" y1="318" x2="958" y2="378" stroke="#506070" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>

  <!-- ═══════════════════════════════════════════════════ -->
