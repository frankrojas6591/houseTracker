  <!-- ═══════════════════════════════════════════════════ -->
  <line x1="550" y1="450" x2="550" y2="475" stroke="#8e7b5e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="200" y="475" width="700" height="62" rx="8" fill="url(#commGrad)" filter="url(#softShadow)"/>
  <rect x="200" y="475" width="700" height="4" rx="2" fill="#a0c088"/>
  <text x="550" y="500" text-anchor="middle" font-size="13" font-weight="bold" fill="#f0f8ee">pytracker.core</text>
  <text x="550" y="518" text-anchor="middle" font-size="10.5" fill="#c8e0b8">comm  ·  auth  ·  records  ·  llm  ·  models</text>
  <text x="550" y="534" text-anchor="middle" font-size="10" fill="#a0c890" font-style="italic">Shared Python package  ·  used by all discipline agents</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- COMMUNICATION CHANNELS — bottom tier               -->
  <!-- ═══════════════════════════════════════════════════ -->
  <line x1="550" y1="537" x2="550" y2="570" stroke="#8e7b5e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="180" y1="570" x2="920" y2="570" stroke="#8e7b5e" stroke-width="1.5"/>

  <!-- Channel boxes -->
  <!-- Voice / Local Mac -->
  <line x1="220" y1="570" x2="220" y2="582" stroke="#8e7b5e" stroke-width="1.5"/>
  <rect x="130" y="582" width="180" height="60" rx="7" fill="#4a4030" filter="url(#softShadow)"/>
  <rect x="130" y="582" width="180" height="3" rx="1.5" fill="#c8a870"/>
  <text x="220" y="604" text-anchor="middle" font-size="12" font-weight="bold" fill="#f5e8c8">Voice  ·  Local Mac</text>
  <text x="220" y="620" text-anchor="middle" font-size="9.5" fill="#c0a870">speech-to-speech</text>
  <text x="220" y="634" text-anchor="middle" font-size="9.5" fill="#c0a870">on-device LLM</text>

  <!-- Web / Mobile -->
  <line x1="440" y1="570" x2="440" y2="582" stroke="#8e7b5e" stroke-width="1.5"/>
  <rect x="350" y="582" width="180" height="60" rx="7" fill="#303a4a" filter="url(#softShadow)"/>
  <rect x="350" y="582" width="180" height="3" rx="1.5" fill="#90a8c8"/>
  <text x="440" y="604" text-anchor="middle" font-size="12" font-weight="bold" fill="#d8e8f8">Web  ·  Mobile</text>
  <text x="440" y="620" text-anchor="middle" font-size="9.5" fill="#a8c8e0">Flask UI (pyTrackers)</text>
  <text x="440" y="634" text-anchor="middle" font-size="9.5" fill="#a8c8e0">Jinja2 templates</text>

  <!-- Notifications -->
  <line x1="660" y1="570" x2="660" y2="582" stroke="#8e7b5e" stroke-width="1.5"/>
  <rect x="570" y="582" width="180" height="60" rx="7" fill="#2a3a2a" filter="url(#softShadow)"/>
  <rect x="570" y="582" width="180" height="3" rx="1.5" fill="#88b888"/>
  <text x="660" y="604" text-anchor="middle" font-size="12" font-weight="bold" fill="#d8f0d8">Notifications</text>
  <text x="660" y="620" text-anchor="middle" font-size="9.5" fill="#a8d8a8">Twilio SMS</text>
  <text x="660" y="634" text-anchor="middle" font-size="9.5" fill="#a8d8a8">monthly check-in</text>

  <!-- External APIs -->
  <line x1="880" y1="570" x2="880" y2="582" stroke="#8e7b5e" stroke-width="1.5"/>
  <rect x="790" y="582" width="180" height="60" rx="7" fill="#3a2a2a" filter="url(#softShadow)"/>
  <rect x="790" y="582" width="180" height="3" rx="1.5" fill="#c88888"/>
  <text x="880" y="604" text-anchor="middle" font-size="12" font-weight="bold" fill="#f8d8d8">External APIs</text>
  <text x="880" y="620" text-anchor="middle" font-size="9.5" fill="#e0b8b8">Epic FHIR · LiturgicalAPI</text>
  <text x="880" y="634" text-anchor="middle" font-size="9.5" fill="#e0b8b8">ResMed myAir · Plaid</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- DATA REPOS — bottom strip                          -->
  <!-- ═══════════════════════════════════════════════════ -->
