  <line x1="80" y1="756" x2="1020" y2="756" stroke="#c8b89a" stroke-width="0.5"/>
  <text x="550" y="774" text-anchor="middle" font-size="9" fill="#a09080">lifeTracker  ·  pyTrackers ecosystem  ·  Frank Rojas  ·  June 2026  ·  v1.0</text>
  <text x="550" y="790" text-anchor="middle" font-size="9" fill="#b8a888" font-style="italic">"The best property manager you never have to manage — your wisest counselor, always available."</text>

