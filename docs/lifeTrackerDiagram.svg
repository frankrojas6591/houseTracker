  <text x="550" y="688" text-anchor="middle" font-size="10" fill="#8e7b5e" font-style="italic">Data Repositories  ·  Private Git  ·  All records local / on-premises</text>

  <!-- repo pills -->
  <rect x="80" y="698" width="185" height="34" rx="17" fill="#2c3e50" opacity="0.85"/>
