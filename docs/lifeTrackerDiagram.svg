  <rect x="900" y="698" width="130" height="34" rx="17" fill="#2c3e50" opacity="0.85"/>
  <text x="965" y="720" text-anchor="middle" font-size="10" fill="#c8d8e8">id_ed25519_fxr</text>

  <!-- ═══════════════════════════════════════════════════ -->
