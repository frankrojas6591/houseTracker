<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">

  <!-- Background -->
  <rect width="1100" height="820" fill="#faf8f5" rx="0"/>

  <!-- Subtle warm grid texture via gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#faf8f5"/>
    </linearGradient>
    <linearGradient id="paGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#1a252f"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8e6b3e"/>
      <stop offset="100%" stop-color="#6b4f2e"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#344d2d"/>
    </linearGradient>
    <linearGradient id="houseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b7fa6"/>
      <stop offset="100%" stop-color="#3d5c7a"/>
    </linearGradient>
    <linearGradient id="medGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a5b8a"/>
      <stop offset="100%" stop-color="#5a3d6a"/>
    </linearGradient>
    <linearGradient id="moneyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7a5b"/>
      <stop offset="100%" stop-color="#2d5c3d"/>
    </linearGradient>
    <linearGradient id="estateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a6040"/>
      <stop offset="100%" stop-color="#5a4428"/>
    </linearGradient>
    <linearGradient id="faithGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a6060"/>
      <stop offset="100%" stop-color="#6a4040"/>
    </linearGradient>
    <linearGradient id="emotGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a7040"/>
      <stop offset="100%" stop-color="#5a5028"/>
    </linearGradient>
    <linearGradient id="recordGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#506070"/>
      <stop offset="100%" stop-color="#30404e"/>
    </linearGradient>
    <linearGradient id="commGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#607050"/>
      <stop offset="100%" stop-color="#404e30"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000025"/>
    </filter>
    <filter id="softShadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <rect width="1100" height="820" fill="url(#bgGrad)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- TITLE AREA                                          -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text x="550" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50" letter-spacing="1">lifeTracker</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#6b5a3e" font-style="italic">Personal Assistance Ecosystem  ·  One Tracker, Six Discipline Agents</text>
  <line x1="80" y1="68" x2="1020" y2="68" stroke="#c8b89a" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- PERSONAL ASSISTANT (PA) — top tier                 -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="330" y="80" width="440" height="78" rx="10" fill="url(#paGrad)" filter="url(#shadow)"/>
  <rect x="330" y="80" width="440" height="4" rx="2" fill="#c8a96e"/>
  <text x="550" y="110" text-anchor="middle" font-size="15" font-weight="bold" fill="#f5f0e8" letter-spacing="0.5">Personal Assistant  (PA)</text>
  <text x="550" y="128" text-anchor="middle" font-size="11" fill="#c8b89a">life.pa.*  ·  Chief of Staff + Wise Counsel</text>
  <text x="550" y="147" text-anchor="middle" font-size="10" fill="#a09080" font-style="italic">Routes all cross-domain queries  ·  Knows your whole life, not just one domain</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- VERTICAL CONNECTOR PA → agents row                 -->
  <!-- ═══════════════════════════════════════════════════ -->
  <line x1="550" y1="158" x2="550" y2="195" stroke="#8e7b5e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="130" y1="195" x2="970" y2="195" stroke="#8e7b5e" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- 6 DISCIPLINE AGENTS — second tier                  -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Agent box dimensions: w=145, h=100, row y=200 -->
  <!-- Positions (center x): 130, 270(gap), 410, 550... let me space evenly -->
  <!-- 6 agents across 1100px with margins: -->
  <!-- x starts: 30, spacing ~170 → centers at 102, 272, 442, 612, 782, 952 -->

  <!-- houseAgent -->
  <line x1="108" y1="195" x2="108" y2="208" stroke="#8e7b5e" stroke-width="1.5"/>
  <rect x="32" y="208" width="152" height="110" rx="8" fill="url(#houseGrad)" filter="url(#softShadow)"/>
  <rect x="32" y="208" width="152" height="4" rx="2" fill="#a8c4e0"/>
  <text x="108" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#f0f4f8">houseAgent</text>
  <text x="108" y="250" text-anchor="middle" font-size="10" fill="#c8d8ea">house.*</text>
  <line x1="48" y1="260" x2="168" y2="260" stroke="#7090b0" stroke-width="0.5" opacity="0.5"/>
  <text x="108" y="274" text-anchor="middle" font-size="9" fill="#b0c8e0">16 discipline agents</text>
  <text x="108" y="288" text-anchor="middle" font-size="9" fill="#b0c8e0">systems · designs · finance</text>
  <text x="108" y="302" text-anchor="middle" font-size="9" fill="#b0c8e0">life · core</text>

  <!-- medicalAgent -->
  <line x1="278" y1="195" x2="278" y2="208" stroke="#8e7b5e" stroke-width="1.5"/>
  <rect x="202" y="208" width="152" height="110" rx="8" fill="url(#medGrad)" filter="url(#softShadow)"/>
  <rect x="202" y="208" width="152" height="4" rx="2" fill="#c4a8d8"/>
  <text x="278" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#f4f0f8">medicalAgent</text>
  <text x="278" y="250" text-anchor="middle" font-size="10" fill="#d8c8ea">medical.*</text>
  <line x1="218" y1="260" x2="338" y2="260" stroke="#906090" stroke-width="0.5" opacity="0.5"/>
  <text x="278" y="274" text-anchor="middle" font-size="9" fill="#d0b8e8">FHIR R4  ·  5M's</text>
  <text x="278" y="288" text-anchor="middle" font-size="9" fill="#d0b8e8">Epic / ARC  ·  UHC</text>
  <text x="278" y="302" text-anchor="middle" font-size="9" fill="#d0b8e8">CPAP  ·  BP  ·  Labs</text>

  <!-- moneyAgent -->
  <line x1="448" y1="195" x2="448" y2="208" stroke="#8e7b5e" stroke-width="1.5"/>
  <rect x="372" y="208" width="152" height="110" rx="8" fill="url(#moneyGrad)" filter="url(#softShadow)"/>
  <rect x="372" y="208" width="152" height="4" rx="2" fill="#a8d8b8"/>
  <text x="448" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#f0f8f2">moneyAgent</text>
  <text x="448" y="250" text-anchor="middle" font-size="10" fill="#c8e8d0">money.*</text>
  <line x1="388" y1="260" x2="508" y2="260" stroke="#509060" stroke-width="0.5" opacity="0.5"/>
  <text x="448" y="274" text-anchor="middle" font-size="9" fill="#b8e0c8">Beancount  ·  OFX</text>
  <text x="448" y="288" text-anchor="middle" font-size="9" fill="#b8e0c8">RMDs  ·  IRMAA</text>
  <text x="448" y="302" text-anchor="middle" font-size="9" fill="#b8e0c8">Owl runway model</text>

  <!-- estateAgent -->
  <line x1="618" y1="195" x2="618" y2="208" stroke="#8e7b5e" stroke-width="1.5"/>
  <rect x="542" y="208" width="152" height="110" rx="8" fill="url(#estateGrad)" filter="url(#softShadow)"/>
  <rect x="542" y="208" width="152" height="4" rx="2" fill="#d8b888"/>
  <text x="618" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#f8f4ee">estateAgent</text>
  <text x="618" y="250" text-anchor="middle" font-size="10" fill="#e8d0a8">estate.*</text>
  <line x1="558" y1="260" x2="678" y2="260" stroke="#907040" stroke-width="0.5" opacity="0.5"/>
